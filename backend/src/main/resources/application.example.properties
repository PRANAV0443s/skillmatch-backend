# =============================================
# SkillMatch Backend - application.properties
# Copy this file to application.properties and fill in your values
# =============================================

server.port=${PORT:8080}

# MongoDB Atlas
spring.data.mongodb.uri=mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER>.mongodb.net/skillmatch?retryWrites=true&w=majority

# JWT
app.jwt.secret=YOUR_256_BIT_SECRET_KEY_HERE_REPLACE_THIS_WITH_SOMETHING_LONG
app.jwt.expiration=86400000

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}
# Flask AI Service URL
flask.service.url=http://localhost:5000

# CORS - Frontend URL
cors.allowed-origins=http://localhost:5173

# Logging
logging.level.com.skillmatch=DEBUG
