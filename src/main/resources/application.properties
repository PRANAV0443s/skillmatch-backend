# =============================================
# SkillMatch Backend - application.properties
# FILL IN YOUR CREDENTIALS BEFORE RUNNING
# =============================================

server.port=${PORT:8080}

# MongoDB Configuration
# OPTION A: Local MongoDB (Default)
spring.data.mongodb.uri=mongodb://localhost:27017/skillmatch

# OPTION B: MongoDB Atlas (Uncomment and fill to use Cloud)
# spring.data.mongodb.uri=mongodb+srv://YOUR_USERNAME:YOUR_PASSWORD@YOUR_CLUSTER.mongodb.net/skillmatch?retryWrites=true&w=majority

# JWT Secret (minimum 256-bit / 32 characters)
app.jwt.secret=SkillMatch2024SuperSecretKeyForJWTTokenGenerationAndValidation
app.jwt.expiration=86400000

# Cloudinary Configuration (REQUIRED for resume uploads)
# Get these from your Cloudinary Dashboard: https://cloudinary.com/console
cloudinary.cloud-name=YOUR_CLOUD_NAME
cloudinary.api-key=YOUR_API_KEY
cloudinary.api-secret=YOUR_API_SECRET

# Flask AI Service URL
flask.service.url=http://localhost:5000

# CORS - Allow Frontend
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Firebase Configuration
# If running locally, set path to your service account key JSON file
firebase.credentials.path=
firebase.credentials.classpath=false

# =============================================
# Email / SMTP Configuration (for OTP verification)
# Using Gmail: Enable "App Passwords" at https://myaccount.google.com/apppasswords
# Leave as empty to use console-logged OTP instead.
# =============================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=pathakjayawant@gmail.com
spring.mail.password=gppcciivbebawulh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.skillmatch=DEBUG
